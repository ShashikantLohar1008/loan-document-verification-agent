spring.application.name=banking-document-verification-agent

spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=Rahitech@2024

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.default_schema=loan_document_verification

management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

document.storage.upload-dir=uploads/documents

ocr.tesseract.datapath=C:/Users/shashikantlohar/AppData/Local/Programs/Tesseract-OCR/tessdata
ocr.tesseract.library-path=C:/Users/shashikantlohar/AppData/Local/Programs/Tesseract-OCR
ocr.tesseract.language=eng
ocr.tesseract.pdf-dpi=300

app.ai.api-key=${GROQ_API_KEY:${OPENAI_API_KEY:}}
app.ai.base-url=${AI_BASE_URL:https://api.groq.com/openai}
app.ai.model=${AI_MODEL:llama-3.1-8b-instant}
app.ai.temperature=0.2

spring.autoconfigure.exclude=\
org.springframework.ai.model.openai.autoconfigure.OpenAiChatAutoConfiguration,\
org.springframework.ai.model.openai.autoconfigure.OpenAiEmbeddingAutoConfiguration,\
org.springframework.ai.model.openai.autoconfigure.OpenAiImageAutoConfiguration,\
org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,\
org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration,\
org.springframework.ai.model.openai.autoconfigure.OpenAiModerationAutoConfiguration
